<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo circular com gradiente -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="carGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fundo -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" stroke="#ffffff" stroke-width="2"/>

  <!-- Ícone do carro estilizado -->
  <g transform="translate(60, 70)">
    <!-- Corpo do carro -->
    <rect x="10" y="25" width="60" height="25" rx="8" fill="url(#carGradient)" stroke="#ffffff" stroke-width="1"/>
    <!-- Teto -->
    <rect x="15" y="15" width="40" height="15" rx="6" fill="url(#carGradient)" stroke="#ffffff" stroke-width="1"/>
    <!-- Janela -->
    <rect x="18" y="18" width="34" height="10" rx="3" fill="#87ceeb" opacity="0.7"/>
    <!-- Rodas -->
    <circle cx="25" cy="55" r="8" fill="#2d3748"/>
    <circle cx="65" cy="55" r="8" fill="#2d3748"/>
    <circle cx="25" cy="55" r="4" fill="#e2e8f0"/>
    <circle cx="65" cy="55" r="4" fill="#e2e8f0"/>
    <!-- Faróis -->
    <circle cx="75" cy="35" r="3" fill="#fbbf24"/>
    <circle cx="5" cy="35" r="3" fill="#fbbf24"/>
  </g>

  <!-- Texto AGENDACAR -->
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffffff">AGENDACAR</text>

  <!-- Slogan -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#e2e8f0">MANUTENÇÃO INTELIGENTE</text>
</svg>